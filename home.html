<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- tailwind + Daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font related -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

<!-- icons -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
    *{
         font-family: "Outfit", sans-serif;
    }
</style>

</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
        <section class="w-11/12 mx-auto p-3 flex justify-between items-center">
            <div class="left flex gap-1">
                <div class="logo w-[60px]">
                    <img src="./assets/logo.png" alt="">
                </div>
                <div class="balance-info ">
                    <h2 class="text-2xl font-bold">$<span id="balance">35789</span></h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="./index.html" class="btn btn-soft"><i class="fa-solid fa-arrow-right-from-bracket"></i>logout</a>
            </div>
        </section>
    </header>

    <section class="w-11/12 mx- py-10 space-y-5">
        <h2 class="font-bold text-3xl">Welcome to Pay<span class="text-[#7460FF]">oo</span></h2>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>

        <div class="buttons grid grid-cols-3 gap-3 ">
            <button onclick="showOnly('add-money')"  class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p>Add Money</p></button>
            <button onclick="showOnly('cash-out')"  class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-2.png" alt="">
                <p>Cash Out</p></button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-3.png" alt="">
                <p>Transfer Money</p></button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-4.png" alt="">
                <p>Get Bonus</p></button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-5.png" alt="">
                <p>Pay Bill</p></button>
            <button onclick="showOnly('transaction-history')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-6.png" alt="">
                <p>Transactions</p></button>
        </div>
    </section>

     <section id="add-money" class="cashout w-11/12 mx-auto py-5 hidden">
               <h2 class="text-2xl font-bold mb-5">Add Money</h2>
        <div class="card bg-base-100 w-full shadow rounded-2xl">
             <div class="card-body">
                 <fieldset class="fieldset">
                     <label class="label text-neutral font-bold">Select Bank</label>
                    <select id="add-money-bank-name" class="select w-full bg-base-200 rounded-full border-none">
                        <option disabled selected>Select a bank</option>
                        <option value="DBBL">DBBL</option>
                        <option value="IBBL">IBBL</option>
                        <option value="City Bank">City Bank</option>
                    </select>
                    <label class="label text-neutral font-bold">Bank Account Number</label>
                    <input id="add-money-bank-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 border-none w-full" placeholder="Enter Your Bank Account Number" />
                     <br>
                     <label class="label text-neutral font-bold">Amount</label>
                     <input id="add-money-amount" type="number" class="input rounded-full bg-base-200 border-none w-full" placeholder="Enter Amount to Add" />
                     <br>
                     <label class="label text-neutral font-bold">4 Digit Pin</label>
                     <input maxlength="4" minlength="4" id="user-pin" type="password" class="input rounded-full bg-base-200 border-none w-full" placeholder=" Enter 4 Digit Pin " />
                     <div></div>
                     <button id="btn-add-money" class="btn bg-[#3B25C1] mt-4 rounded-full text-[white]">Add Money</button>
                    </fieldset>
                </div>
            </div>
     </section>

    <section id="cash-out" class="w-11/12 mx-auto py-5 hidden" >
        <h2 class="text-2xl font-bold mb-5">Cash Out</h2>
        <div class="card bg-base-100 w-full shadow rounded-2xl">
             <div class="card-body">
                 <fieldset class="fieldset">
                     <label class="label text-neutral font-bold">Agent Number</label>
                     <input id="agent-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 border-none w-full" placeholder="Enter Agent 11 Digit Number" />
                     <br>
                     <label class="label text-neutral font-bold">Amount</label>
                     <input id="withdraw-amount" type="number" class="input rounded-full bg-base-200 border-none w-full" placeholder="Enter amount to withdraw" />
                     <br>
                     <label class="label text-neutral font-bold">4 Digit Pin</label>
                     <input maxlength="4" minlength="4" id="user-pin" type="password" class="input rounded-full bg-base-200 border-none w-full" placeholder=" Enter 4 Digit Pin " />
                     <div></div>
                     <button id="btn-withdraw" class="btn bg-[#3B25C1] mt-4 rounded-full text-[white]">Withdraw Money</button>
                    </fieldset>
                </div>
            </div>
        </section>
        <section id="transaction-history" class="w-11/12 mx-auto py-5 hidden">
             <h2 class="text-2xl font-bold mb-5">Transaction History</h2>
                <div class="space-y-5 bg-base-100 w-full shadow rounded-2xl" id="history-container">
                </div>
        </section>
        
   
        
    <script src="./script/commonfuntion.js"></script>
    <script src="./script/add-money.js"></script>
    <script src="./script/cashout.js"></script>
</body>
</html>
